<main class="mainCriarBilhete">

  <div class="formWrapper">

    <div class="cabecalho">
      <span class="tag">AngoVota 2026</span>
      <h1>Registar<br><span class="outline">Bilhete</span></h1>
      <p>Preencha os dados do eleitor para emissão do bilhete de acesso.</p>
    </div>

    <div class="formBilhete">
      
      <!-- Mensagem de status -->
      <div class="mensagemStatus" *ngIf="mensagem" [class.erro]="erroEnvio" [class.sucesso]="!erroEnvio">
        {{ mensagem }}
      </div>

      <form [formGroup]="bilheteForm" (ngSubmit)="onSubmit()">
        
        <div class="camposGrid">

          <div class="campo">
            <label>Número BI *</label>
            <input formControlName="numero_bi" type="text" [ngClass]="getClass('numero_bi')" placeholder="Ex: 12345678901234" minlength="14" maxlength="14" />
            <div *ngIf="bilheteForm.get('numero_bi')?.invalid && bilheteForm.get('numero_bi')?.touched" class="error">
              Número do BI deve ter exatamente 14 caracteres alfanuméricos.
            </div>
          </div>

          <div class="campo">
            <label>Nome Completo *</label>
            <input formControlName="nome_completo" type="text" [ngClass]="getClass('nome_completo')" placeholder="Ex: João Manuel Silva" />
            <div *ngIf="bilheteForm.get('nome_completo')?.invalid && bilheteForm.get('nome_completo')?.touched" class="error">
              Nome deve ter pelo menos 3 caracteres.
            </div>
          </div>

          <div class="campo">
            <label>Data de Nascimento *</label>
            <input formControlName="data_nascimento" type="date" [ngClass]="getClass('data_nascimento')" />
            <div *ngIf="bilheteForm.get('data_nascimento')?.invalid && bilheteForm.get('data_nascimento')?.touched" class="error">
              Data de nascimento é obrigatória.
            </div>
          </div>

          <div class="campo">
            <label>Gênero</label>
            <select formControlName="genero" [ngClass]="getClass('genero')">
              <option value="">Selecione</option>
              <option value="Masculino">Masculino</option>
              <option value="Feminino">Feminino</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <div class="campo">
            <label>Nacionalidade</label>
            <input formControlName="nacionalidade" type="text" [ngClass]="getClass('nacionalidade')" placeholder="Ex: Angolana" />
          </div>

          <div class="campo">
            <label>Local de Emissão</label>
            <input formControlName="local_emissao" type="text" [ngClass]="getClass('local_emissao')" placeholder="Ex: Luanda" />
          </div>

        </div>

        <div class="botoes">
          <button type="button" class="btnCancelar" (click)="resetForm()">
            Cancelar
          </button>
          <button type="submit" class="btnSubmit" [disabled]="bilheteForm.invalid || enviando">
            <span *ngIf="!enviando">Criar Bilhete</span>
            <span *ngIf="enviando" class="loader">
              <span class="dotLoader"></span>
              <span class="dotLoader"></span>
              <span class="dotLoader"></span>
            </span>
          </button>
        </div>

      </form>
    </div>

  </div>
</main>
